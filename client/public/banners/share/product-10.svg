<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69"/>
      <stop offset="40%" style="stop-color:#1a0a3e"/>
      <stop offset="70%" style="stop-color:#4a2c8a"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7ef9ff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Decorative -->
  <circle cx="740" cy="0" r="180" fill="#00d4ff" opacity="0.06"/>
  <circle cx="60" cy="600" r="200" fill="#00d4ff" opacity="0.04"/>
  <circle cx="400" cy="300" r="280" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="400" cy="300" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="120" cy="100" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="680" cy="150" r="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="200" cy="480" r="2.5" fill="rgba(255,255,255,0.2)"/>

  <!-- Branding -->
  <text x="30" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" fill="rgba(255,255,255,0.18)" letter-spacing="3">FINXPERT</text>
  <text x="770" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="end" letter-spacing="1">Powered by KreditBee</text>

  <!-- Badge -->
  <rect x="290" y="120" width="220" height="30" rx="15" fill="url(#accent)"/>
  <text x="400" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5">⭐ INSTANT APPROVAL</text>

  <!-- Title -->
  <text x="400" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle"><tspan fill="white"></tspan><tspan fill="#00d4ff">KreditBee</tspan><tspan fill="white"> Instant Loan</tspan></text>

  <!-- Subtitle -->
  <text x="400" y="273" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)" text-anchor="middle">Exclusive Partner Offer · Apply Today</text>

  <!-- Benefit Chips -->
  <rect x="120" y="313" width="160" height="85" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="200" y="351" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="900" fill="#00d4ff" text-anchor="middle">10</text>
  <text x="200" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1.5">MINS DISBURSAL</text>

  <rect x="310" y="313" width="160" height="85" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="390" y="351" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="900" fill="#00d4ff" text-anchor="middle">₹4L</text>
  <text x="390" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1.5">MAX AMOUNT</text>

  <rect x="500" y="313" width="160" height="85" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="580" y="351" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="900" fill="#00d4ff" text-anchor="middle">100%</text>
  <text x="580" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1.5">ONLINE</text>

  <!-- CTA -->
  <rect x="290" y="421" width="180" height="44" rx="22" fill="url(#accent)"/>
  <text x="380" y="449" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="white" text-anchor="middle">Apply Now →</text>

  <text x="500" y="449" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">via Finxpert Partner</text>

  <!-- Bottom bar -->
  <rect x="0" y="595" width="800" height="5" fill="url(#bar)"/>
</svg>