<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="40%" style="stop-color:#082f49"/>
      <stop offset="70%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Decorative -->
  <circle cx="740" cy="0" r="180" fill="#38bdf8" opacity="0.06"/>
  <circle cx="60" cy="600" r="200" fill="#38bdf8" opacity="0.04"/>
  <circle cx="400" cy="300" r="280" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="400" cy="300" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="120" cy="100" r="3" fill="#38bdf8" opacity="0.5"/>
  <circle cx="680" cy="150" r="2" fill="#38bdf8" opacity="0.4"/>
  <circle cx="200" cy="480" r="2.5" fill="rgba(255,255,255,0.2)"/>

  <!-- Branding -->
  <text x="30" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" fill="rgba(255,255,255,0.18)" letter-spacing="3">FINXPERT</text>
  <text x="770" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="end" letter-spacing="1">Powered by HDFC ERGO</text>

  <!-- Badge -->
  <rect x="275" y="120" width="250" height="30" rx="15" fill="url(#accent)"/>
  <text x="400" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5">⭐ PROTECT YOUR FAMILY</text>

  <!-- Title -->
  <text x="400" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle"><tspan fill="white"></tspan><tspan fill="#38bdf8">HDFC</tspan><tspan fill="white"> </tspan><tspan fill="#38bdf8">ERGO</tspan><tspan fill="white"> Health</tspan></text>
  <text x="400" y="263" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle"><tspan fill="white">Insurance</tspan></text>

  <!-- Subtitle -->
  <text x="400" y="321" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)" text-anchor="middle">Exclusive Partner Offer · Apply Today</text>

  <!-- Benefit Chips -->
  <rect x="120" y="361" width="160" height="85" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="200" y="399" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="900" fill="#38bdf8" text-anchor="middle">CASHLESS</text>
  <text x="200" y="423" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1.5">TREATMENT</text>

  <rect x="310" y="361" width="160" height="85" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="390" y="399" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="900" fill="#38bdf8" text-anchor="middle">80D</text>
  <text x="390" y="423" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1.5">TAX BENEFIT</text>

  <rect x="500" y="361" width="160" height="85" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="580" y="399" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="900" fill="#38bdf8" text-anchor="middle">24/7</text>
  <text x="580" y="423" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1.5">AMBULANCE</text>

  <!-- CTA -->
  <rect x="290" y="469" width="180" height="44" rx="22" fill="url(#accent)"/>
  <text x="380" y="497" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="white" text-anchor="middle">Apply Now →</text>

  <text x="500" y="497" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">via Finxpert Partner</text>

  <!-- Bottom bar -->
  <rect x="0" y="595" width="800" height="5" fill="url(#bar)"/>
</svg>